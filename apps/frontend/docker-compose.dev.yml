name: vaks-frontend-dev

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vaks-frontend-dev
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: https://host.docker.internal:3003
      NEXT_PUBLIC_WS_ENABLED: "false"
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3001
      NEXT_PUBLIC_PENDING_INVITATIONS_ENDPOINT: /invitations/pending
      NEXT_PUBLIC_DEBUG_INVITES: "true"
      NEXT_PUBLIC_DEBUG_LOGIN: "true"
      NEXT_PUBLIC_DEBUG_API_REQUESTS: "true"
      NEXT_PUBLIC_DEBUG_CAMPAIGN_DETAIL: "true"
      NEXT_PUBLIC_DEBUG_CAMPAIGN_IMAGE: "true"
      NEXT_PUBLIC_SILENCE_BACKEND_REQUESTS: "false"
      API_GATEWAY_INTERNAL_URL: http://host.docker.internal:3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  frontend_node_modules:
