name: Trans

services:
  api-gateway:
    build: ./Backend/api-gateway
    image: api-gateway
    container_name: api-gateway
    dns: 127.0.0.11
    restart: unless-stopped
    ports:
      - ${API_GATEWAY_PORT}:3000
    secrets:
      - jwt_secret
      - redis_password
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT}
      CAMPAIGN_SERVICE_URL: http://campaign-service:${CAMPAIGN_SERVICE_PORT}
      NOTIFICATION_SERVICE_URL: http://notification-service:${NOTIFICATION_SERVICE_PORT}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT}
      WALLET_SERVICE_URL: http://wallet-service:${WALLET_SERVICE_PORT}
      LEDGER_SERVICE_URL: http://ledger-service:${LEDGER_SERVICE_PORT}
    networks:
      - TransNetwork
    depends_on:
      redis:
        condition: service_healthy

  authDb:
    image: postgres:16
    container_name: authDb
    restart: unless-stopped
    secrets:
      - auth_db_password
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/auth_db_password
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - authnet

  auth-service:
    build: ./Backend/auth-service
    image: auth-service
    container_name: auth-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    secrets:
      - jwt_secret
      - auth_db_password
      - redis_password
      - google_client_id
      - google_client_secret
      - fortytwo_client_id
      - fortytwo_client_secret
      - facebook_client_id
      - facebook_client_secret
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${AUTH_SERVICE_PORT}
      DB_HOST: ${AUTH_DB_HOST}
      DB_PORT: ${AUTH_DB_PORT}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USER: ${AUTH_DB_USER}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      GOOGLE_CLIENT_ID_FILE: /run/secrets/google_client_id
      GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FORTYTWO_CLIENT_ID_FILE: /run/secrets/fortytwo_client_id
      FORTYTWO_CLIENT_SECRET_FILE: /run/secrets/fortytwo_client_secret
      FORTYTWO_CALLBACK_URL: ${FORTYTWO_CALLBACK_URL}
      FACEBOOK_CLIENT_ID_FILE: /run/secrets/facebook_client_id
      FACEBOOK_CLIENT_SECRET_FILE: /run/secrets/facebook_client_secret
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - TransNetwork
      - authnet
    depends_on:
      authDb:
        condition: service_healthy
      redis: 
        condition: service_healthy

  campaignDb:
    image: postgres:16
    container_name: campaignDb
    restart: unless-stopped
    secrets:
      - campaign_db_password
    environment:
      POSTGRES_DB: ${CAMPAIGN_DB_NAME}
      POSTGRES_USER: ${CAMPAIGN_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/campaign_db_password
    volumes:
      - campaign_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CAMPAIGN_DB_USER} -d ${CAMPAIGN_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campaignnet

  campaign-service:
    build: ./Backend/campaign-service
    image: campaign-service
    container_name: campaign-service
    restart: unless-stopped
    secrets:
      - campaign_db_password
      - redis_password
      - internal_api_key
      - jwt_secret
      - r2_access_key_id
      - r2_secret_access_key
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${CAMPAIGN_SERVICE_PORT}
      DB_HOST: ${CAMPAIGN_DB_HOST}
      DB_PORT: ${CAMPAIGN_DB_PORT}
      DB_NAME: ${CAMPAIGN_DB_NAME}
      DB_USER: ${CAMPAIGN_DB_USER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      WALLET_SERVICE_URL: http://wallet-service:${WALLET_SERVICE_PORT}
      INTERNAL_API_KEY_FILE: /run/secrets/internal_api_key
      CAMPAIGN_IMAGE_STORAGE: ${CAMPAIGN_IMAGE_STORAGE:-local}
      CAMPAIGN_UPLOADS_DIR: /app/uploads
      CAMPAIGN_PUBLIC_BASE_URL: ${CAMPAIGN_PUBLIC_BASE_URL:-http://localhost:3000}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    volumes:
      - campaign_uploads:/app/uploads
    networks:
      - TransNetwork
      - campaignnet
    depends_on:
      campaignDb:
        condition: service_healthy
      redis: 
        condition: service_healthy

  notificationDb:
    image: postgres:16
    container_name: notificationDb
    restart: unless-stopped
    secrets:
      - notification_db_password
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/notification_db_password
    volumes:
      - notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER} -d ${NOTIFICATION_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notificationnet

  notification-service:
    build: ./Backend/notification-service
    image: notification-service
    container_name: notification-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    ports:
      - "3003:3003"
    secrets:
      - notification_db_password
      - redis_password
      - jwt_secret
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${NOTIFICATION_SERVICE_PORT}
      DB_HOST: ${NOTIFICATION_DB_HOST}
      DB_PORT: ${NOTIFICATION_DB_PORT}
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USER: ${NOTIFICATION_DB_USER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    networks:
      - TransNetwork
      - notificationnet
    depends_on:
      notificationDb:
        condition: service_healthy
      redis: 
        condition: service_healthy

  userDb:
    image: postgres:16
    container_name: userDb
    restart: unless-stopped
    secrets:
      - user_db_password
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/user_db_password
    volumes:
      - user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - usernet

  user-service:
    build: ./Backend/user-service
    image: user-service
    container_name: user-service
    dns: 127.0.0.11
    restart: unless-stopped
    secrets:
      - user_db_password
      - redis_password
      - r2_access_key_id
      - r2_secret_access_key
      - jwt_secret
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${USER_SERVICE_PORT}
      DB_HOST: ${USER_DB_HOST}
      DB_PORT: ${USER_DB_PORT}
      DB_NAME: ${USER_DB_NAME}
      DB_USER: ${USER_DB_USER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      WALLET_SERVICE_URL: http://wallet-service:${WALLET_SERVICE_PORT}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    networks:
      - TransNetwork
      - usernet
    depends_on:
      userDb:
        condition: service_healthy
      redis: 
        condition: service_healthy

  walletDb:
    image: postgres:16
    container_name: walletDb
    restart: unless-stopped
    secrets:
      - wallet_db_password
    environment:
      POSTGRES_DB: ${WALLET_DB_NAME}
      POSTGRES_USER: ${WALLET_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/wallet_db_password
    volumes:
      - wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WALLET_DB_USER} -d ${WALLET_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walletnet

  wallet-service:
    build: ./Backend/wallet-service
    image: wallet-service
    container_name: wallet-service
    dns: 127.0.0.11
    restart: unless-stopped
    secrets:
      - wallet_db_password
      - redis_password
      - internal_api_key
      - jwt_secret
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${WALLET_SERVICE_PORT}
      DB_HOST: ${WALLET_DB_HOST}
      DB_PORT: ${WALLET_DB_PORT}
      DB_NAME: ${WALLET_DB_NAME}
      DB_USER: ${WALLET_DB_USER}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT}
      INTERNAL_API_KEY_FILE: /run/secrets/internal_api_key
      FRONTEND_URL: ${FRONTEND_URL}
      TOPUP_CHECKOUT_PATH: ${TOPUP_CHECKOUT_PATH:-/carteira/carregar}
    networks:
      - TransNetwork
      - walletnet
    depends_on:
      walletDb:
        condition: service_healthy
      redis: 
        condition: service_healthy

  ledgerDb:
    image: postgres:16
    container_name: ledgerDb
    restart: unless-stopped
    secrets:
      - ledger_db_password
    environment:
      POSTGRES_DB: ${LEDGER_DB_NAME}
      POSTGRES_USER: ${LEDGER_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/ledger_db_password
    volumes:
      - ledger_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LEDGER_DB_USER} -d ${LEDGER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledgennet

  ledger-service:
    build: ./Backend/ledger-service
    image: ledger-service
    container_name: ledger-service
    dns: 127.0.0.11
    restart: unless-stopped
    secrets:
      - ledger_db_password
      - redis_password
      - jwt_secret
      - admin_private_key
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${LEDGER_SERVICE_PORT}
      DB_HOST: ${LEDGER_DB_HOST}
      DB_PORT: ${LEDGER_DB_PORT}
      DB_NAME: ${LEDGER_DB_NAME}
      DB_USER: ${LEDGER_DB_USER}
      DB_PASSWORD_FILE: /run/secrets/ledger_db_password
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL}
      VAKS_CONTRACT_ADDRESS: ${VAKS_CONTRACT_ADDRESS}
      ADMIN_PRIVATE_KEY_FILE: /run/secrets/admin_private_key
    networks:
      - TransNetwork
      - ledgennet
    depends_on:
      ledgerDb:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    secrets:
      - redis_password
    command: sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password)"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$(cat /run/secrets/redis_password)", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - TransNetwork

volumes:
  auth_data:
  campaign_data:
  campaign_uploads:
  notification_data:
  user_data:
  wallet_data:
  ledger_data:

secrets:
  auth_db_password:
    file: ./secrets/auth_db_password.txt
  campaign_db_password:
    file: ./secrets/campaign_db_password.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt
  fortytwo_client_id:
    file: ./secrets/fortytwo_client_id.txt
  fortytwo_client_secret:
    file: ./secrets/fortytwo_client_secret.txt
  facebook_client_id:
    file: ./secrets/facebook_client_id.txt
  facebook_client_secret:
    file: ./secrets/facebook_client_secret.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  notification_db_password:
    file: ./secrets/notification_db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  user_db_password:
    file: ./secrets/user_db_password.txt
  wallet_db_password:
    file: ./secrets/wallet_db_password.txt
  ledger_db_password:
    file: ./secrets/ledger_db_password.txt
  admin_private_key:
    file: ./secrets/admin_private_key.txt
  r2_access_key_id:
    file: ./secrets/r2_access_key_id.txt
  r2_secret_access_key:
    file: ./secrets/r2_secret_access_key.txt
  internal_api_key:
    file: ./secrets/internal_api_key.txt

networks:
  TransNetwork:
    driver: bridge
  authnet:
    driver: bridge
  campaignnet:
    driver: bridge
  notificationnet:
    driver: bridge
  usernet:
    driver: bridge
  walletnet:
    driver: bridge
  ledgennet:
    driver: bridge