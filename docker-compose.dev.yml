# ============================================================
# Docker Compose para DESENVOLVIMENTO LOCAL
# Sobe apenas a infraestrutura (bancos de dados + Redis)
# com portas expostas para localhost.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#
# Depois rode o serviço localmente:
#   cd Backend/auth-service && npm run start:dev
# ============================================================
name: trans-dev

services:
  # ── Auth Database ──────────────────────────────────────────
  authDb:
    image: postgres:16
    container_name: authDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - auth_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Campaign Database ──────────────────────────────────────
  campaignDb:
    image: postgres:16
    container_name: campaignDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: campaign
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5433:5432"
    volumes:
      - campaign_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_user -d campaign"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Notification Database ──────────────────────────────────
  notificationDb:
    image: postgres:16
    container_name: notificationDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5434:5432"
    volumes:
      - notification_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── User Database ──────────────────────────────────────────
  userDb:
    image: postgres:16
    container_name: userDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5435:5432"
    volumes:
      - user_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Wallet Database ─────────────────────────────────────────
  walletDb:
    image: postgres:16
    container_name: walletDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5436:5432"
    volumes:
      - wallet_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_user -d wallet"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    command: redis-server --requirepass change_me
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "change_me", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  auth_data_dev:
  campaign_data_dev:
  notification_data_dev:
  user_data_dev:
  wallet_data_dev:
