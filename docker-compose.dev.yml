      - ./Backend/wallet-service/tsconfig.json:/app/tsconfig.json
      - ./Backend/wallet-service/tsconfig.build.json:/app/tsconfig.build.json
      - ./Backend/wallet-service/nest-cli.json:/app/nest-cli.json
      - ./Backend/wallet-service/prisma.config.ts:/app/prisma.config.ts
    networks:
      - devnet
    depends_on:
      walletDb:
        condition: service_healthy
      redis:
        condition: service_healthy

# ═══════════════════════════════════════════════════════════
  #  LEDGER SERVICE
  # ═══════════════════════════════════════════════════════════
  ledgerDb:
    image: postgres:16
    container_name: ledgerDb-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5437:5432"
    volumes:
      - ledger_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user -d ledger"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - devnet

  ledger-service:
    build:
      context: ./Backend/ledger-service
      dockerfile: Dockerfile.dev
    container_name: ledger-service-dev
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DB_HOST: ledgerDb
      DB_PORT: 5432
      DB_NAME: ledger
      DB_USER: ledger_user
      DB_PASSWORD: change_me
      JWT_SECRET: change_me
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: change_me
      AVALANCHE_RPC_URL: https://api.avax-test.network/ext/bc/C/rpc
      VAKS_CONTRACT_ADDRESS: ${VAKS_CONTRACT_ADDRESS:-}
      ADMIN_PRIVATE_KEY: ${ADMIN_PRIVATE_KEY:-}
    volumes:
      - ./Backend/ledger-service/src:/app/src
      - ./Backend/ledger-service/prisma:/app/prisma
      - ./Backend/ledger-service/tsconfig.json:/app/tsconfig.json
      - ./Backend/ledger-service/tsconfig.build.json:/app/tsconfig.build.json
      - ./Backend/ledger-service/nest-cli.json:/app/nest-cli.json
    networks:
      - devnet
    depends_on:
      ledgerDb:
        condition: service_healthy
      redis:
        condition: service_healthy


  # ═══════════════════════════════════════════════════════════
  #  REDIS
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    restart: unless-stopped
    command: redis-server --requirepass change_me
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "change_me", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - devnet

volumes:
  auth_data_dev:
  campaign_data_dev:
  notification_data_dev:
  user_data_dev:
  wallet_data_dev:
  ledger_data_dev:

networks:
  devnet:
    driver: bridge
